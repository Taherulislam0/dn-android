name: Build WebView Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-webview:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 20
      APP_NAME: "Dohar Connect"
      PACKAGE_NAME: "com.dohar.connect"
      WEB_URL: "https://dohar-connect.vercel.app/"
      # Keystore secrets for signing (optional)
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 1️⃣ Install Capacitor CLI + core + android
      - name: Install Capacitor dependencies
        run: npm install @capacitor/cli @capacitor/core @capacitor/android --save

      # 2️⃣ Initialize Capacitor + Add Android
      - name: Initialize Capacitor WebView App
        run: |
          if [ ! -d "android" ]; then
            npx cap init "${APP_NAME}" "${PACKAGE_NAME}"
            npx cap add android
          fi

      # 3️⃣ Generate minimal web assets (index.html with iframe to your URL)
      - name: Generate WebView HTML
        run: |
          mkdir -p www
          echo "<!DOCTYPE html>
<html>
  <head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>${APP_NAME}</title>
  </head>
  <body>
    <iframe src='${WEB_URL}' style='width:100%; height:100vh; border:none;'></iframe>
  </body>
</html>" > www/index.html

      # 4️⃣ Sync Capacitor Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 5️⃣ Grant gradlew execute permission
      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      # 6️⃣ Build Debug APK
      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 7️⃣ Build Release APK
      - name: Build Release APK
        working-directory: ./android
        run: |
          if [ -f android/app/keystore.jks ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=android/app/keystore.jks \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            ./gradlew assembleRelease
          fi

      # 8️⃣ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: webview-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 9️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: webview-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
