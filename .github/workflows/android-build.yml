name: Build React + Capacitor Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 20

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3️⃣ Install React / Capacitor dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build React project
      - name: Build React
        run: npm run build

      # 5️⃣ Install Capacitor Android
      - name: Install Capacitor Android
        run: npm install @capacitor/android

      # 6️⃣ Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 7️⃣ Grant gradlew execute permission
      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      # 8️⃣ Build Debug APK
      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 9️⃣ Build Release APK
      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      # 🔟 Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dn-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 1️⃣1️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dn-android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
