- name: Generate WebView HTML
        run: |
          mkdir -p www
          cat <<EOT > www/index.html
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${APP_NAME}</title>
</head>
<body>
  <iframe src="${WEB_URL}" style="width:100%; height:100vh; border:none;"></iframe>
</body>
</html>
EOT
